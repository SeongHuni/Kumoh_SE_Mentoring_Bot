name: Quality

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: |
            backend/requirements.txt
            backend/requirements-dev.txt

      - name: Install backend dependencies
        run: python -m pip install -r backend/requirements-dev.txt

      - name: Run backend tests and coverage gate
        run: >-
          python -m pytest -c backend/pyproject.toml backend/tests
          --cov=backend.app --cov=backend.scripts
          --cov-config=backend/pyproject.toml --cov-report=term-missing
        env:
          AI_PROVIDER: local

      - name: Run Ruff
        run: python -m ruff check backend

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    env:
      CI: true
      NEXT_TELEMETRY_DISABLED: 1
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run frontend tests
        run: npm --prefix frontend test

      - name: Run TypeScript check
        run: npm --prefix frontend run typecheck

      - name: Run ESLint
        run: npm --prefix frontend run lint

      - name: Build frontend
        run: npm --prefix frontend run build
